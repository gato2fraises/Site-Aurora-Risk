name: PHP Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl
    
    - name: Validate PHP Syntax
      run: |
        for file in $(find . -name "*.php" -type f); do
          echo "Checking $file..."
          php -l "$file" || exit 1
        done
    
    - name: Success
      run: echo "✅ All PHP files validated successfully"
